<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Послуги Потойбіччя</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .nav {
            margin-bottom: 40px;
        }
        .nav a {
            color: #bb86fc;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            transition: color 0.2s;
        }
        .nav a:hover {
            color: #9965f4;
            text-decoration: underline;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #a0a0a0;
            margin-bottom: 40px;
            font-size: 16px;
        }

        /* Контейнер, який вишикує кнопки в один стовпчик */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* Стиль для посилань-кнопок та кнопок у формах */
        .menu-btn {
            display: block;
            width: 100%;
            box-sizing: border-box;
            background-color: #bb86fc;
            color: #121212;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
        }

        .menu-btn:hover {
            background-color: #9965f4;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(153, 101, 244, 0.4);
        }

        .menu-btn:active {
            transform: translateY(0);
        }

        /* Окрема форма, щоб кнопка займала всю ширину */
        form {
            width: 100%;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <div class="nav">
        <a href="/">Головна</a>
        <a href="/profile">Профіль</a>
    </div>

    <h1>Маніпуляції Долею</h1>
    <p class="subtitle">Оберіть необхідну дію для вашої душі</p>

    <div class="menu-container">

        <a href="/test" class="menu-btn">Пройти тест</a>

        <form action="/book_service" method="POST">
            <input type="hidden" name="service_name" value="Комфортабельний Котел">
            <input type="hidden" name="cost" value="50">
            <button type="submit" class="menu-btn">Замовити котел (50 душ)</button>
        </form>

        <form action="/book_service" method="POST">
            <input type="hidden" name="service_name" value="Персональний Провідник">
            <input type="hidden" name="cost" value="70">
            <button type="submit" class="menu-btn">Замовити провідника (70 душ)</button>
        </form>

    </div>

</body>
</html>
