<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест долі</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

header {
    background: #111;
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid #333;
}

header h1 {
    margin: 0;
    color: #b3a1ff;
}

nav {
    background: #151515;
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #222;
}

nav a {
    color: #ffffff;
    margin: 0 15px;
    text-decoration: none;
}

nav a:hover {
    color: #b3a1ff;
}

.box {
    background: #1a1a1a;
    margin: 50px auto;
    padding: 30px;
    max-width: 700px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 15px rgba(179, 161, 255, 0.05);
}

.info {
    background: #111;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.btn {
    background: #b3a1ff;
    color: white;
    border: none;
    padding: 12px 24px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
    margin: 10px;
    transition: background 0.2s;
}

.btn:hover {
    background: #9a87ff;
}

#answers {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 20px;
}
</style>
</head>
<body>

<header>
    <h1>Тест визначення долі</h1>
</header>

<nav>
    <a href="/">Про нас</a>
    <a href="/services">Послуги</a>
    <a href="/profile">Профіль</a>
</nav>

<div class="box">
    <div id="quiz">
        <div class="info" id="question-info">Запитання 1 з 5</div>
        <h2 id="question">Завантаження запитання...</h2>
        <div id="answers"></div>
    </div>
    <div id="result-box" style="display: none;">
        <h2>Ваш вердикт потойбіччя</h2>
        <p id="result-text" style="font-size: 18px; margin: 20px 0; line-height: 1.5;"></p>
        <a href="/profile"><button class="btn">Перейти в профіль</button></a>
    </div>
</div>

<script>
const questions = [
    { q: "Як часто ви дивитесь контент18+?", a: ["Завжди, коли міг", "Іноді", "Рідко", "Ніколи"], s: [0, 2, 4, 6] },
    { q: "Ви збрехали на попереднє питання?", a: ["Ні", "Частково", "Скоріше так", "Так"], s: [0, 2, 5, 6] },
    { q: "Вам соробно за те що збрихали?", a: ["Каюсь", "Соромно", "Ні", "ІДІ НАХ*Й"], s: [0, 2, 4, 6] },
    { q: "Тобі так сильно хотілось сказати іді нах*й?" a: ["Ні я би так не зробив", "було бажання", "Це дуже сильна спокуса", "ІДІ НАХ*Й"], s: [0, 2, 4, 5] },
    { q: "Збити бабку чи дитину?", a: ["Я врятую обох", "Дитину", "бабку", "Від мене ніхто не втече)))"], s: [0, 2, 4, 6] }
];

let currentQuestion = 0;
let score = 0;

function loadQuestion() {
    if (currentQuestion >= questions.length) {
        showResult();
        return;
    }
    const qData = questions[currentQuestion];
    document.getElementById("question-info").innerText = `Запитання ${currentQuestion + 1} з ${questions.length}`;
    document.getElementById("question").innerText = qData.q;
    
    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";
    
    qData.a.forEach((ans, index) => {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.innerText = ans;
        btn.onclick = () => {
            score += qData.s[index];
            currentQuestion++;
            loadQuestion();
        };
        answersDiv.appendChild(btn);
    });
}

function getResultText(score) {
    if (score <= 5) return "😇 Ти занадто ідеальний... Система вважає, що ти перебільшив свою святість на землі.";
    if (score <= 12) return "🙂 Нормальний результат. У тобі гармонійно співіснують і світла, і темна сторони.";
    if (score <= 18) return "😏 Є велика підозра, що ти хитрий і мутний персонаж.";
    if (score <= 25) return "😈 Тобі вже щосили гріють персональне місце в котлі.";
    return "💀 Дуже темна душа. Демони нижчих кіл аплодують твоїй біографії стоячи.";
}

function saveResultToProfile(text) {
    fetch("/save_test_result", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "result=" + encodeURIComponent(text)
    });
}

function showResult() {
    document.getElementById("quiz").style.display = "none";
    const resultText = getResultText(score);
    document.getElementById("result-text").innerText = resultText;
    document.getElementById("result-box").style.display = "block";
    saveResultToProfile(resultText);
}

loadQuestion();
</script>
</body>
</html>
