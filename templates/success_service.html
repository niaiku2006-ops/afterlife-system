<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Послугу активовано</title>
<style>
body{ margin:0; font-family:Arial; background:#0b0b0b; color:#e0e0e0; }
header{ background:#111; padding:20px; text-align:center; }
nav{ background:#151515; padding:10px; text-align:center; }
nav a{ color:#ccc; margin:0 15px; text-decoration:none; }
nav a:hover{ color:#b3a1ff; }
.box{ background:#1a1a1a; margin:60px auto; padding:30px; max-width:600px; border-radius:12px; text-align:center; box-shadow:0 0 15px rgba(179,161,255,0.2); }
h2{ color:#b3a1ff; }
button{ display:block; margin:15px auto; padding:12px; width:80%; cursor:pointer; background:#b3a1ff; border:none; border-radius:6px; color:white; font-size:15px; text-align:center; text-decoration:none;}
button:hover{ background:#9a87ff; }
</style>
</head>
<body>
<header><h1>AfterLife System</h1></header>
<nav>
    <a href="/">Про нас</a>
    <a href="/services">Послуги</a>
    <a href="/profile">Профіль</a>
</nav>
<div class="box">
    <h2>🎉 Послугу успішно активовано!</h2>
    <p>Ви успішно придбали: <b>{{ service_name }}</b></p>
    <p>Дані внесено до вашого потойбічного профілю.</p>
    <a href="/profile" style="text-decoration: none;"><button>Перейти в профіль</button></a>
</div>
</body>
</html>
