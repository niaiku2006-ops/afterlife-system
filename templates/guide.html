<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пошук провідника</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b0b0b;
    color:#e0e0e0;
}

header{
    background:#111;
    padding:20px;
    text-align:center;
    border-bottom:1px solid #444;
}

h1{
    margin:0;
    color:#b3a1ff;
}

nav{
    text-align:center;
    padding:10px;
    background:#151515;
}

nav a{
    color:#ccc;
    margin:0 15px;
    text-decoration:none;
}

nav a:hover{
    color:#b3a1ff;
}

main{
    padding:30px 20px;
}

.box{
    background:#1a1a1a;
    max-width:600px;
    margin:0 auto;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(179,161,255,0.2);
}

h2{
    margin-top:0;
    color:#b3a1ff;
    text-align:center;
}

p{
    text-align:center;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    color:#ccc;
}

select,
input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#111;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#b3a1ff;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#9a87ff;
}

.info{
    margin-top:20px;
    padding:15px;
    background:#111;
    border-radius:8px;
    color:#bbb;
    font-size:14px;
    line-height:1.5;
}

footer{
    text-align:center;
    padding:10px;
    background:#111;
    border-top:1px solid #444;
    margin-top:30px;
}
</style>
</head>
<body>

<header>
    <h1>Пошук провідника</h1>
</header>

<nav>
    <a href="/">Про нас</a>
    <a href="/services">Послуги</a>
    <a href="/profile">Профіль</a>
</nav>

<main>
    <div class="box">
        <h2>Оформлення послуги</h2>
        <p>Оберіть тип провідника, кількість годин супроводу та час.</p>

        <form method="POST">
            <label for="guide_type">Тип провідника</label>
            <select name="guide_type" id="guide_type" required>
                <option value="basic">Basic — 20 душ за 1 годину</option>
                <option value="premium">Premium — 40 душ за 1 годину</option>
            </select>

            <label for="hours">Кількість годин</label>
            <input type="number" name="hours" id="hours" min="1" value="1" required>

            <label for="booking_time">Дата та час початку супроводу</label>
            <input type="datetime-local" name="booking_time" id="booking_time" required>

            <button type="submit">Продовжити</button>
        </form>

        <div class="info">
            Після натискання кнопки тебе перекине на сторінку підтвердження,
            де буде показано остаточну ціну.
        </div>
    </div>
</main>

<footer>
    <p>© 2026 AfterLife System</p>
</footer>

</body>
</html>
