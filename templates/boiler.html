<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бронювання котла</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: #e0e0e0;
}

header {
    background: #111;
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid #333;
}

h1 {
    margin: 0;
    color: #b3a1ff;
}

nav {
    text-align: center;
    padding: 10px;
    background: #151515;
    border-bottom: 1px solid #222;
}

nav a {
    color: #ffffff;
    margin: 0 15px;
    text-decoration: none;
}

nav a:hover {
    color: #b3a1ff;
}

main {
    padding: 30px 20px;
}

.box {
    background: #1a1a1a;
    max-width: 600px;
    margin: 0 auto;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(179, 161, 255, 0.1);
}

h2 {
    color: #b3a1ff;
    margin-top: 0;
}

form {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
}

label {
    font-weight: bold;
    color: #ccc;
}

select, input {
    padding: 12px;
    background: #111;
    border: 1px solid #333;
    color: white;
    border-radius: 6px;
    font-size: 15px;
}

select:focus, input:focus {
    border-color: #b3a1ff;
    outline: none;
}

button {
    padding: 14px;
    background: #b3a1ff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    transition: background 0.2s;
    margin-top: 10px;
}

button:hover {
    background: #9a87ff;
}

.desc {
    color: #aaa;
    font-size: 14px;
    line-height: 1.5;
}
</style>
</head>
<body>

<header>
    <h1>Бронювання котла</h1>
</header>

<nav>
    <a href="/">Про нас</a>
    <a href="/services">Послуги</a>
    <a href="/profile">Профіль</a>
</nav>

<main>
    <div class="box">
        <h2>Оформлення бронювання</h2>
        <p>Оберіть тип котла, кількість днів та час початку.</p>

        <form method="POST" action="/boiler">
            <label for="boiler_type">Тип котла</label>
            <select name="boiler_type" id="boiler_type" required>
                <option value="standard">Standard — 30 душ за 1 день</option>
                <option value="vip">VIP — 60 душ за 1 день</option>
            </select>

            <label for="days">Кількість днів</label>
            <input type="number" name="days" id="days" min="1" value="1" required>

            <label for="booking_time">Дата та час початку оренди</label>
            <input type="datetime-local" name="booking_time" id="booking_time" required>

            <p class="desc">Після натискання кнопки «Забронювати», кошти будуть списані з вашого балансу автоматично, а послуга з'явиться у вашому профілі.</p>

            <button type="submit">Забронювати котел</button>
        </form>
    </div>
</main>

</body>
</html>
